<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>神秘禮物盒班級抽籤系統</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime"
      }
    }
  </script>
</head>
<body class="bg-gray-100 overflow-hidden">
  <div id="root"></div>

  <script type="text/babel" data-type="module" data-presets="react">
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Settings, RotateCcw, Lock, Unlock, History, Volume2, VolumeX, X, Trophy, AlertCircle, Gift, Star, Calendar, Trash2, Copy, CheckCircle2, Download, EyeOff, Save, Upload } from 'lucide-react';

    const DEFAULT_STUDENTS = `1 王小明\n2 陳小華\n3 林小美\n4 張大頭\n5 李阿呆\n6 趙可愛\n7 孫悟空\n8 豬八戒\n9 沙悟淨\n10 唐三藏`;
    const DEFAULT_SETTINGS = { title: '神秘幸運得主', inputMode: 'list', rawList: DEFAULT_STUDENTS, totalSeats: 30, emptySeats: '', displayMode: 'both', includeEmpty: true, theme: 'standard', fastAnim: false, soundEnabled: true, isLocked: true, drawCount: 1, showAvatars: true, hideRemaining: false };
    const THEMES = {
      standard: { name: '童趣派對', bg: 'bg-gradient-to-br from-pink-100 via-purple-100 to-indigo-100', boxColors: ['#FF9AA2', '#FFB7B2', '#FFDAC1', '#E2F0CB', '#B5EAD7', '#C7CEEA'] },
      christmas: { name: '聖誕驚喜', bg: 'bg-gradient-to-br from-red-100 to-green-200', boxColors: ['#D32F2F', '#388E3C', '#FBC02D', '#FFFFFF'] },
      newyear: { name: '新年福袋', bg: 'bg-gradient-to-br from-amber-100 via-yellow-100 to-orange-200', boxColors: ['#D32F2F', '#C62828', '#E53935', '#B71C1C'] },
      space: { name: '星空探險', bg: 'bg-gradient-to-br from-gray-900 via-purple-900 to-indigo-900', boxColors: ['#FF007F', '#00D4FF', '#7000FF', '#FFD700', '#00FF88'] },
      ocean: { name: '深海尋寶', bg: 'bg-gradient-to-br from-cyan-900 via-blue-800 to-blue-900', boxColors: ['#00FFFF', '#20B2AA', '#48D1CC', '#FFA500', '#FF4500'] }
    };
    const ENCOURAGEMENTS = ["勇氣滿分！", "運氣爆棚！", "今天你是主角！", "掌聲鼓勵！", "太棒了！"];
    const AVATARS = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼', '🐨', '🐯', '🦁', '🐮', '🐷', '🐸', '🐵', '🦉', '🦄', '🦖'];

    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;
    const playSound = (type, isEnabled) => {
      if (!isEnabled) return;
      if (!audioCtx) audioCtx = new AudioContext();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator(), gainNode = audioCtx.createGain();
      osc.connect(gainNode); gainNode.connect(audioCtx.destination);
      const now = audioCtx.currentTime;
      if (type === 'click') {
        osc.type = 'sine'; osc.frequency.setValueAtTime(600, now); osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
        gainNode.gain.setValueAtTime(0.3, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        osc.start(now); osc.stop(now + 0.1);
      } else if (type === 'shake') {
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, now);
        for (let i = 0; i < 5; i++) { osc.frequency.linearRampToValueAtTime(150, now + i * 0.1 + 0.05); osc.frequency.linearRampToValueAtTime(100, now + i * 0.1 + 0.1); }
        gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.5);
        osc.start(now); osc.stop(now + 0.5);
      } else if (type === 'tada') {
        osc.type = 'triangle'; osc.frequency.setValueAtTime(523.25, now); osc.frequency.setValueAtTime(659.25, now + 0.1); osc.frequency.setValueAtTime(783.99, now + 0.2); osc.frequency.setValueAtTime(1046.50, now + 0.3);
        gainNode.gain.setValueAtTime(0, now); gainNode.gain.linearRampToValueAtTime(0.4, now + 0.1); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 1.5);
        osc.start(now); osc.stop(now + 1.5);
      } else if (type === 'empty') {
        osc.type = 'sine'; osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.5);
        gainNode.gain.setValueAtTime(0.3, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
        osc.start(now); osc.stop(now + 0.5);
      }
    };

    const ThemeIcon = ({ theme, color, isOpened, index = 0 }) => {
      const commonClass = isOpened ? "w-full h-full absolute top-0 left-0 opacity-40 grayscale" : "w-full h-full drop-shadow-xl";
      switch (theme) {
        case 'christmas': return (
          <svg viewBox="0 0 100 100" className={commonClass} preserveAspectRatio="xMidYMid meet">
            <rect x="42" y="70" width="16" height="25" fill="#795548" />
            <path d="M50 30 L15 80 L85 80 Z" fill={color} strokeLinejoin="round" />
            <path d="M50 10 L25 50 L75 50 Z" fill={color} strokeLinejoin="round" />
            {!isOpened && (
              <>
                <circle cx="35" cy="70" r="4.5" fill="#FFEB3B" />
                <circle cx="65" cy="65" r="4.5" fill="#FF5252" />
                <circle cx="45" cy="45" r="4.5" fill="#4FC3F7" />
                <path d="M50 5 L53 12 L60 12 L54 17 L56 24 L50 20 L44 24 L46 17 L40 12 L47 12 Z" fill="#FFD700" />
              </>
            )}
          </svg>
        );
        case 'newyear': return (
          <svg viewBox="0 0 100 100" className={commonClass} preserveAspectRatio="xMidYMid meet">
            <rect x="25" y="15" width="50" height="75" rx="4" fill={color} />
            {!isOpened && (
              <>
                <path d="M25 15 Q50 40 75 15" fill="rgba(0,0,0,0.15)" />
                <path d="M25 15 Q50 35 75 15" stroke="#FFD700" strokeWidth="2.5" fill="none" />
                <circle cx="50" cy="35" r="10" fill="#FFD700" />
                <rect x="46" y="31" width="8" height="8" fill={color} />
              </>
            )}
            {isOpened && <rect x="30" y="20" width="40" height="60" fill="rgba(0,0,0,0.1)" />}
          </svg>
        );
        case 'space': return (
          <svg viewBox="0 0 100 100" className={commonClass} preserveAspectRatio="xMidYMid meet">
            <path d="M25 50 Q50 5 75 50" fill="rgba(255,255,255,0.7)" />
            {!isOpened && <circle cx="50" cy="35" r="12" fill="#81C784" />}
            <ellipse cx="50" cy="55" rx="45" ry="16" fill={color} />
            <ellipse cx="50" cy="52" rx="45" ry="12" fill="rgba(255,255,255,0.15)" />
            {!isOpened && (
              <>
                <circle cx="20" cy="55" r="3.5" fill="#FFF" />
                <circle cx="50" cy="61" r="3.5" fill="#FFF" />
                <circle cx="80" cy="55" r="3.5" fill="#FFF" />
              </>
            )}
            {isOpened && <ellipse cx="50" cy="55" rx="20" ry="5" fill="rgba(0,0,0,0.2)" />}
          </svg>
        );
        case 'ocean': return index % 2 === 0 ? (
          <svg viewBox="0 0 100 100" className={commonClass} preserveAspectRatio="xMidYMid meet">
            <path d="M 25 50 L 5 30 L 5 70 Z" fill={color} />
            <path d="M 45 25 L 55 5 L 65 25 Z" fill={color} />
            <path d="M 45 75 L 55 95 L 65 75 Z" fill={color} />
            <ellipse cx="55" cy="50" rx="35" ry="25" fill={color} />
            {!isOpened && (
              <>
                <path d="M 45 26 Q 55 50 45 74" stroke="rgba(255,255,255,0.6)" strokeWidth="4" fill="none" />
                <path d="M 65 30 Q 75 50 65 70" stroke="rgba(255,255,255,0.6)" strokeWidth="4" fill="none" />
                <circle cx="75" cy="42" r="4" fill="#333" />
                <circle cx="76" cy="41" r="1.5" fill="#FFF" />
                <path d="M 75 55 Q 80 58 85 55" stroke="#333" strokeWidth="2" fill="none" strokeLinecap="round" />
              </>
            )}
            {isOpened && <ellipse cx="55" cy="50" rx="20" ry="10" fill="rgba(0,0,0,0.15)" />}
          </svg>
        ) : (
          <svg viewBox="0 0 100 100" className={commonClass} preserveAspectRatio="xMidYMid meet">
            <path d="M 50 10 L 62 35 L 90 35 L 67 55 L 75 85 L 50 65 L 25 85 L 33 55 L 10 35 L 38 35 Z" fill={color} stroke="rgba(0,0,0,0.05)" strokeWidth="2" strokeLinejoin="round" />
            {!isOpened && (
              <>
                <circle cx="42" cy="48" r="4" fill="#333" />
                <circle cx="58" cy="48" r="4" fill="#333" />
                <circle cx="43" cy="47" r="1.5" fill="#FFF" />
                <circle cx="59" cy="47" r="1.5" fill="#FFF" />
                <path d="M 46 56 Q 50 62 54 56" stroke="#333" strokeWidth="2" fill="none" strokeLinecap="round" />
                <circle cx="50" cy="25" r="2.5" fill="rgba(255,255,255,0.5)" />
                <circle cx="70" cy="45" r="2.5" fill="rgba(255,255,255,0.5)" />
                <circle cx="30" cy="45" r="2.5" fill="rgba(255,255,255,0.5)" />
                <circle cx="60" cy="70" r="2.5" fill="rgba(255,255,255,0.5)" />
                <circle cx="40" cy="70" r="2.5" fill="rgba(255,255,255,0.5)" />
              </>
            )}
            {isOpened && <circle cx="50" cy="50" r="15" fill="rgba(0,0,0,0.15)" />}
          </svg>
        );
        case 'standard': default: return (
          <svg viewBox="0 0 100 100" className={commonClass} preserveAspectRatio="xMidYMid meet">
            <rect x="15" y="40" width="70" height="55" rx="6" fill={color} />
            <rect x="42" y="40" width="16" height="55" fill="#FFFBEB" className="ribbon-svg" />
            {!isOpened && (
              <>
                <rect x="10" y="25" width="80" height="20" rx="4" fill={color} />
                <rect x="10" y="42" width="80" height="3" fill="rgba(0,0,0,0.15)" />
                <rect x="42" y="25" width="16" height="20" fill="#FFFBEB" className="ribbon-svg" />
                <path d="M50 25 C30 0, 15 20, 45 25 Z" fill="#FFFBEB" className="ribbon-svg" />
                <path d="M50 25 C70 0, 85 20, 55 25 Z" fill="#FFFBEB" className="ribbon-svg" />
                <circle cx="50" cy="25" r="5" fill="#FDE68A" />
              </>
            )}
            {isOpened && <path d="M10 50 L20 20 L80 20 L90 50 Z" fill="rgba(0,0,0,0.1)" />}
          </svg>
        );
      }
    };

    function App() {
      const [isAppReady, setIsAppReady] = useState(false); 
      const [isDrawing, setIsDrawing] = useState(false); 
      const [students, setStudents] = useState([]); 
      const [boxes, setBoxes] = useState([]);       
      const [history, setHistory] = useState([]);   
      const [confetti, setConfetti] = useState([]); 
      const [toast, setToast] = useState(null);
      const [confirmDialog, setConfirmDialog] = useState({ isOpen: false, message: '', onConfirm: null, type: 'warning' });
      const [view, setView] = useState('main'); 
      const [revealDataList, setRevealDataList] = useState([]); 
      const fileInputRef = useRef(null); 
      
      const [settings, setSettings] = useState(() => {
        const saved = localStorage.getItem('MysteryGiftBox_Settings');
        if (saved) try { return { ...DEFAULT_SETTINGS, ...JSON.parse(saved) }; } catch (e) { console.error(e); }
        return DEFAULT_SETTINGS;
      });

      useEffect(() => { localStorage.setItem('MysteryGiftBox_Settings', JSON.stringify(settings)); }, [settings]);
      useEffect(() => { const t = setTimeout(() => setIsAppReady(true), 500); return () => clearTimeout(t); }, []);

      useEffect(() => { parseAndInitialize(); }, [settings.rawList, settings.inputMode, settings.totalSeats, settings.emptySeats, settings.includeEmpty, settings.theme]);

      const parseAndInitialize = () => {
        let list = [];
        if (settings.inputMode === 'number') {
          const total = parseInt(settings.totalSeats) || 0;
          const empty = settings.emptySeats.split(/[,\s、]+/).map(n => parseInt(n)).filter(n => !isNaN(n));
          for (let i = 1; i <= total; i++) if (!empty.includes(i)) list.push({ id: `stu-${i}`, no: i, name: `同學`, type: 'student' });
        } else {
          list = settings.rawList.split('\n').filter(l => l.trim() !== '').map((line, i) => {
            const parts = line.trim().split(/[\s,、\t]+/);
            if (parts.length > 1 && !isNaN(parts[0])) return { id: `stu-${i}`, no: parts[0], name: parts.slice(1).join(' '), type: 'student' };
            return { id: `stu-${i}`, no: i + 1, name: line.trim(), type: 'student' };
          });
        }
        setStudents(list); generateBoxes(list);
      };

      const generateBoxes = (list) => {
        let items = [...list];
        if (settings.includeEmpty && items.length > 0) {
          for (let i = 0; i < Math.ceil(items.length * 0.2); i++) items.push({ id: `extra-${i}`, type: Math.random() > 0.5 ? 'empty' : 'surprise', message: ENCOURAGEMENTS[Math.floor(Math.random() * ENCOURAGEMENTS.length)] });
        }
        for (let i = items.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [items[i], items[j]] = [items[j], items[i]]; }
        const colors = THEMES[settings.theme].boxColors;
        setBoxes(items.map((item, index) => ({ boxId: `box-${index}`, color: colors[index % colors.length], state: 'idle', content: item })));
        setRevealDataList([]); setIsDrawing(false); 
      };

      const showToast = (msg, type = 'info') => { setToast({ message: msg, type }); setTimeout(() => setToast(null), 3000); };

      const handleExportSettings = () => {
        try {
          const link = document.createElement("a");
          link.href = URL.createObjectURL(new Blob([JSON.stringify(settings, null, 2)], { type: "application/json" }));
          link.download = `抽籤設定_${new Date().toLocaleDateString('zh-TW').replace(/\//g, '')}.json`;
          link.click(); showToast("設定匯出成功！", "success");
        } catch (e) { showToast("匯出失敗", "error"); }
      };

      const handleImportSettings = (e) => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const data = JSON.parse(ev.target.result);
            if (data && data.rawList !== undefined) { setSettings({ ...DEFAULT_SETTINGS, ...data }); showToast("設定匯入成功！", "success"); }
            else showToast("無效設定檔", "error");
          } catch (err) { showToast("檔案無法解析", "error"); }
          e.target.value = '';
        }; reader.readAsText(file);
      };

      const fireConfetti = () => {
        const colors = ['#FF9AA2', '#FFB7B2', '#FFDAC1', '#E2F0CB', '#B5EAD7', '#C7CEEA', '#FDE68A', '#A78BFA'];
        setConfetti(Array.from({ length: 80 }).map((_, i) => ({ id: Date.now() + i, left: Math.random() * 100 + 'vw', backgroundColor: colors[Math.floor(Math.random() * colors.length)], animationDuration: (Math.random() * 2 + 2) + 's', animationDelay: (Math.random() * 0.2) + 's', width: (Math.random() * 8 + 6) + 'px', height: (Math.random() * 8 + 6) + 'px', rotate: Math.random() * 360 + 'deg' })));
        setTimeout(() => setConfetti([]), 4000); 
      };

      const getStudentText = (c) => c.type !== 'student' ? '' : settings.displayMode === 'number' ? `${c.no}號` : settings.displayMode === 'name' ? c.name : `${c.no}號 ${c.name}`;
      const getAvatar = (c) => c.type === 'surprise' ? '⭐' : c.type === 'empty' ? '💨' : AVATARS[(parseInt(c.no) - 1 || 0) % AVATARS.length];

      const openBoxes = (indexes) => {
        if (isDrawing) return; setIsDrawing(true); 
        setBoxes(p => p.map((b, i) => indexes.includes(i) ? { ...b, state: 'shaking' } : b)); playSound('shake', settings.soundEnabled);
        setTimeout(() => {
          const contents = indexes.map(i => boxes[i].content);
          setBoxes(p => p.map((b, i) => indexes.includes(i) ? { ...b, state: 'opened' } : b));
          setRevealDataList(contents);
          if (contents.some(c => c.type === 'student' || c.type === 'surprise')) { playSound('tada', settings.soundEnabled); fireConfetti(); } else playSound('empty', settings.soundEnabled);
          const newItems = contents.filter(c => c.type === 'student').map(c => ({ time: new Date().toLocaleTimeString('zh-TW', {hour: '2-digit', minute:'2-digit'}), task: settings.title + (indexes.length > 1 ? ' (群組)' : ''), target: getStudentText(c) }));
          if (newItems.length > 0) setHistory(p => [...newItems, ...p]);
          setIsDrawing(false); 
        }, settings.fastAnim ? 600 : 1500);
      };

      const handleBoxClick = (index) => {
        if (settings.isLocked) return showToast("請先點擊上方解鎖 🔓", "warning");
        if (isDrawing || boxes[index].state !== 'idle') return;
        const idxs = [index];
        if (settings.drawCount > 1) {
          const avail = boxes.map((b, i) => b.state === 'idle' && i !== index ? i : -1).filter(i => i !== -1);
          for (let i = 0; i < Math.min(settings.drawCount - 1, avail.length); i++) {
            const rand = Math.floor(Math.random() * avail.length); idxs.push(avail[rand]); avail.splice(rand, 1);
          }
        }
        openBoxes(idxs);
      };

      const handleRandomDraw = () => {
        if (settings.isLocked) return showToast("請先點擊上方解鎖 🔓", "warning");
        if (isDrawing) return; 
        const avail = boxes.map((b, i) => b.state === 'idle' ? i : -1).filter(i => i !== -1);
        if (avail.length === 0) return showToast("已經沒有未開啟的項目囉！🎁", "warning");
        const idxs = [];
        for (let i = 0; i < Math.min(settings.drawCount, avail.length); i++) {
          const rand = Math.floor(Math.random() * avail.length); idxs.push(avail[rand]); avail.splice(rand, 1);
        }
        openBoxes(idxs);
      };

      const handleAbsentRedraw = () => { setRevealDataList([]); playSound('click', settings.soundEnabled); setTimeout(() => handleRandomDraw(), 300); };
      const handleReset = () => setConfirmDialog({ isOpen: true, type: 'warning', message: '確定要重新洗牌嗎？', onConfirm: () => { generateBoxes(students); playSound('click', settings.soundEnabled); showToast("已重新洗牌！", "success"); }});
      const handleQuickReset = () => setConfirmDialog({ isOpen: true, type: 'warning', message: '確定重置畫面並清空紀錄？', onConfirm: () => { generateBoxes(students); setHistory([]); playSound('click', settings.soundEnabled); showToast("已重置！", "success"); }});
      const handleClearHistory = () => setConfirmDialog({ isOpen: true, type: 'danger', message: '確定清空所有紀錄？', onConfirm: () => { setHistory([]); playSound('click', settings.soundEnabled); showToast("紀錄已清空", "success"); }});
      const handleFactoryReset = () => setConfirmDialog({ isOpen: true, type: 'danger', message: '恢復預設值將清除設定與名單！', onConfirm: () => { setSettings({ ...DEFAULT_SETTINGS }); setHistory([]); playSound('click', settings.soundEnabled); showToast("已恢復預設狀態", "success"); setView('main'); }});
      const copyHistory = () => { if (history.length === 0) return showToast("無紀錄可複製", "warning"); navigator.clipboard.writeText(history.map(h => `[${h.time}] ${h.task} - ${h.target}`).join('\n')).then(() => showToast("已複製到剪貼簿", "success")).catch(() => showToast("複製失敗", "error")); };
      const exportHistoryToCSV = () => {
        if (history.length === 0) return showToast("無紀錄可匯出", "warning");
        const link = document.createElement("a");
        link.href = URL.createObjectURL(new Blob(["\uFEFF時間,抽籤主題,抽中名單\n" + history.map(h => `"${h.time}","${h.task}","${h.target}"`).join('\n')], { type: 'text/csv;charset=utf-8;' }));
        link.download = `抽籤紀錄_${new Date().toLocaleDateString('zh-TW')}.csv`; link.click(); showToast("紀錄已下載！", "success");
      };

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) return;
          if (confirmDialog.isOpen) { if (e.code === 'Enter') { e.preventDefault(); confirmDialog.onConfirm?.(); setConfirmDialog({ isOpen: false }); } else if (e.code === 'Escape') setConfirmDialog({ isOpen: false }); return; }
          if (e.code === 'Space') { e.preventDefault(); if (revealDataList.length === 0 && !settings.isLocked && view === 'main' && !isDrawing) handleRandomDraw(); } 
          else if (e.code === 'Enter' || e.code === 'Escape') { if (revealDataList.length > 0) { setRevealDataList([]); playSound('click', settings.soundEnabled); } else if (view !== 'main') { setView('main'); playSound('click', settings.soundEnabled); } }
        };
        window.addEventListener('keydown', handleKeyDown); return () => window.removeEventListener('keydown', handleKeyDown);
      }, [revealDataList, settings.isLocked, view, boxes, confirmDialog, settings.drawCount, isDrawing]);

      const remCount = boxes.filter(b => b.state !== 'opened' && b.content.type === 'student').length;
      if (!isAppReady) return (<div className={`min-h-screen flex flex-col items-center justify-center ${THEMES[settings.theme].bg}`}><Gift className="w-16 h-16 text-pink-500 animate-bounce mb-4" /><div className="text-xl font-bold text-gray-700 animate-pulse tracking-widest">系統環境安全準備中...</div></div>);

      return (
        <div className={`min-h-screen transition-colors duration-500 ${THEMES[settings.theme].bg} flex flex-col relative overflow-hidden`} style={{ fontFamily: '"Nunito", "Comic Sans MS", "Chalkboard SE", "PingFang TC", sans-serif' }}>

                  </div>
                </div>
                <div className="mt-8 pt-5 border-t-2 border-gray-100 flex justify-between items-center bg-white"><button onClick={handleFactoryReset} className="text-red-500 hover:text-red-700 text-sm font-bold hover:bg-red-50 px-4 py-2 rounded-lg transition-colors flex items-center gap-1 cursor-pointer"><RotateCcw size={16} className="pointer-events-none" /> 恢復預設值</button><button onClick={() => setView('main')} className="px-10 py-3.5 bg-indigo-600 text-white rounded-full font-black shadow-lg shadow-indigo-200 hover:bg-indigo-700 hover:scale-105 active:scale-95 transition-all text-lg cursor-pointer">完成設定</button></div>
              </div>
            </div>
          )}

          {view === 'history' && (
            <div className="fixed inset-0 z-[80] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4"><div className="bg-white rounded-3xl p-6 md:p-8 w-full max-w-lg shadow-2xl max-h-[85vh] flex flex-col"><div className="flex justify-between items-center mb-6 border-b-2 border-gray-100 pb-4"><h2 className="text-2xl font-black flex items-center gap-3 text-gray-800"><div className="bg-pink-100 p-2 rounded-lg text-pink-600 pointer-events-none"><Calendar size={24}/></div>抽籤紀錄</h2><div className="flex items-center gap-2"><button onClick={exportHistoryToCSV} className="p-2 hover:bg-green-50 rounded-full text-green-600 transition-colors cursor-pointer" title="下載 Excel"><Download size={22} className="pointer-events-none" /></button><button onClick={copyHistory} className="p-2 hover:bg-indigo-50 rounded-full text-indigo-500 transition-colors cursor-pointer" title="複製紀錄"><Copy size={22} className="pointer-events-none" /></button><button onClick={() => setView('main')} className="p-2 hover:bg-gray-100 rounded-full text-gray-400 hover:text-gray-600 transition-colors cursor-pointer"><X size={26} className="pointer-events-none" /></button></div></div>
              <div className="flex-1 overflow-y-auto pr-2 pb-4">
                {history.length === 0 ? (<div className="text-center py-16 text-gray-400 bg-gray-50 rounded-2xl border-2 border-dashed border-gray-200 pointer-events-none"><History className="w-16 h-16 mx-auto mb-4 opacity-20" /><p className="font-bold text-lg text-gray-500">尚無抽籤紀錄</p></div>) : (<ul className="space-y-3">{history.map((record, i) => (<li key={i} className="flex justify-between items-center bg-white p-4 rounded-2xl border-2 border-gray-100 shadow-sm hover:border-pink-200 transition-colors group"><div className="flex flex-col"><span className="font-black text-gray-800 text-xl pointer-events-none">{record.target}</span><span className="text-sm text-gray-500 font-medium mt-1 pointer-events-none">{record.task}</span></div><span className="text-sm font-bold text-indigo-500 bg-indigo-50 px-3 py-1.5 rounded-lg group-hover:bg-indigo-100 transition-colors pointer-events-none">{record.time}</span></li>))}</ul>)}
              </div>
              <div className="mt-4 pt-5 border-t-2 border-gray-100 flex justify-between items-center"><button onClick={handleClearHistory} disabled={history.length === 0} className={`text-sm font-bold px-4 py-2 rounded-lg transition-colors flex items-center gap-1 cursor-pointer ${history.length === 0 ? 'text-gray-300 cursor-not-allowed' : 'text-red-500 hover:text-red-700 hover:bg-red-50'}`}><Trash2 size={16} className="pointer-events-none" /> 清空紀錄</button><button onClick={() => setView('main')} className="px-8 py-3 bg-gray-800 text-white rounded-full font-bold shadow-md hover:bg-gray-900 transition-colors cursor-pointer">關閉</button></div>
            </div></div>
          )}
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
